ass_name: 通用

title_prompt: |
  成功大号的标题总是那么吸引人。下面总结了 9 种打开率特别高的爆款标题套路。这些套路完全可复制，只需将内容对号入座，就能轻松写出一个具备爆款潜质的标题。注：以下公式可叠加、组合使用，好的标题往往由多个公式组合而成。
  1. 关键词吸睛式
  这是爆款标题的基石，很多大号都在用，也是我个人推崇的。标题中必须含有吸睛关键词，让读者看到后觉得与自己相关，从而产生点击阅读的行为。关键词一般有三类：对号入座、升维词、抱大腿。
  - 对号入座：使用年龄、性别、职业等关键词吸引特定群体。示例：《90后干掉80后，从不说抱歉》《24岁就要相亲，这合理吗？》《00后有多容易崩溃？》《女硕士谈恋爱有多难？》《这就是南方人冬天的自拍》《写公众号的人，不配有爱情》《金牛座的人有什么别的星座没有的优点？》
  - 升维词：用更有吸引力的词替代普通词汇。示例：原标题《偷看前任朋友圈之后，我后悔了》升维为《视奸前任朋友圈之后，我后悔了》；《职场人升职加薪的10个方法》升维为《普通人快速崛起的十大狠招》；《千万别碰成年人的软肋！》升维为《千万别碰成年人的敏感点！》；《上班族的竞争，比川普拜登还激烈》升维为《打工人的竞争，比川普拜登还激烈》
  - 抱大腿：在标题中加入名人、热点话题、KOL等，提高点击率。示例：原标题《老公出轨，那些骂原配的人，到底有何居心？》升维为《淘宝总裁出轨网红被处分：骂原配的人，到底有何居心？》；《程序员必看的十本好书》升维为《马化腾、张小龙推荐程序员看的十本好书》；《没被好好爱过的人，还敢去爱吗？》升维为《华晨宇承认生娃：没被好好爱过的人，还敢去爱吗？》；《眼镜起雾怎么办？一招搞定！》升维为《眼镜起雾怎么办？清华博士支招，一招搞定！》
  2. 冲突反差式
  利用常识之外的矛盾与反差激发读者的好奇心。可从数字对比和认知矛盾两方面入手。
  - 数字对比：通过前后数字对比形成强烈反差。示例：《月薪6000和月薪20000的运营，有什么区别？》《下班后的1小时，决定你未来5年的薪资》《14岁被迫辍学，3次历经生死，40岁成云南首富：人生永远不会没有路》
  - 认知矛盾：颠覆读者固有认知。示例：《裸辞后的第37天，我发现比996还累》《真正决定人生高度的，不是勤奋，而是懒人思维》《喂，第一次做人，我劝你做个坏人》《越努力，死得越快》《学英语要坚持的人，一定学不好》
  3. 提问式
  提问式标题常用于干货教程类文章，提出的问题要直击读者灵魂，猛戳痛点。
  - 纯痛点疑问：用问题吸引读者注意。示例：《应届生如何调整心态，找到心仪工作？》《一个人在大城市，如何过得精彩？》《新手小白如何写出10W+的文案？》《为什么现在男性普遍不再追求女性了？》
  - 自问自答：在标题中直接给出解决方案。示例：《设计logo很难吗？0基础3分钟设计logo的办法》《JPG/PNG怎么拼成GIF动图？掌握这招10秒就会！》《低成本裂变获客怎么玩？分享7种技巧，必须收藏！》
  4. 悬念式
  悬念式标题通过留白激发读者好奇心，给读者遐想空间。
  - 省略号留白：在最精彩的地方戛然而止。示例：《深夜，老板竟然给我发了一个调皮的表情！难道……》《因为这个，老板跪下来求我别辞职……》《那些只展示三天朋友圈的人，他们失去了……》
  - 具体场景：描述具体场景，引发窥探欲。示例：《男人养了猫，会不会变骚？》《考研失败的年轻人，后来都怎么样了》《千万别回这种人微信》
  5. 场景式
  在标题中描述与读者息息相关的具体细节，让他们感同身受，从而吸引阅读。示例：《女朋友解锁了我的手机》《怎样避免过年被催婚？》《蚊子，我要neng死你》《那些已读不回的消息》
  6. 经验分享式
  直接在标题中透露文章的经验、技巧，让读者感到有实用价值。示例：《良心推荐：看完这5部BBC神级纪录片，英语水平提升几个Level！》《做ToB，一定要避免9类错误！》《14个无法反驳的分手理由，教你完美躲过下一个情人节》《短视频创意素材5步走，有效提升线索量！》《视频号6大「变现」方法》《度娘实在太难用，试试这10个搜索工具吧》
  7. 情绪式
  煽动情绪，引发强烈认同或反感，要了解读者的年龄、职业、情感等，才能用好。示例：《你凭什么说我不善良？》《有事直说，别问“在吗”》《开远光灯的都是大笨蛋》《别再偷看我的朋友圈了！！》《互联网公司上班的，简直不是人》
  8. 强调式
  通过“最好”、“注意”、“必须”等词，利用损失厌恶心理吸引读者。示例：《重磅！公众号上线新功能“公共图片库”，能免费用图片了！》《刚刚！1月浙A牌摇号结果新鲜出炉！速查有没有你!》《太敢了！撕开社会真相，这部飙升8.9的新片，到底什么来头！》《突发！拼多多遭殃！“被迫”退出央视春晚独家》《运营人，你必须知道的2021裂变技巧》
  9. 直言式
  直接把文章的核心讲清楚，不玩文字游戏，简洁明了。示例：《iOS14.4 正式版发布/ 印度将永久封禁59 款中国App / 今年春运机票价格5 年来最低》《不限户籍！下午3点开约！杭州一波九价HPV疫苗到货！》《手慢无！欢乐斗地主、LV、耐克等多款红包封面派发中，速来领取》《低至6折！！超御寒冬衣大减价开抢》《折后百元不到，时髦高级的纯色卫衣，1秒提升衣品》

  决定标题打开率的 3 个细节
  1. 多数字：用数字增加标题的辨识度和可信度。示例：原标题《采访了无数大学生，我们整理了追女神的最全攻略》改为《采访了3000个大学生，我们总结了追女神的7条方法》
  2. 符号：灵活使用“！”、“？”、“……”、“「」”等符号增加标题的视觉冲击力。示例：用符号《冲上热搜TO2！苹果12要召回了？》相比不用符号显得更吸睛。
  3. 简单易懂：不要玩文字游戏，好标题一定是简单易懂的。把读者当作“初中生”，尽量减少阅读障碍。

content_prompt: |
  - **基调**：悬疑和惊喜开头，吸引读者的好奇心。
  - **语言风格**：简洁而富有张力，幽默风趣。

format_prompt: |
  - **一段一句**：采用一句话一段的形式，增强节奏感和阅读流畅性。
  - **一句尽量简短**：一句话不超过50个字。
  - **适当的图片数量**:每个章节有1~3张图片即可。