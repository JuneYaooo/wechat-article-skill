ass_name: 社会热点
title_prompt: |
  成功的标题总是那么吸引人。下面总结了 7 种打开率特别高的社会热点标题套路。这些套路完全可复制，只需将内容对号入座，就能轻松写出一个具备爆款潜质的标题。注：以下公式可叠加、组合使用，好的标题往往由多个公式组合而成。
  1. **关键词吸睛式**
  这是爆款标题的基石，必须包含能够吸引目标读者的关键词，让他们觉得内容与自己相关，从而产生点击阅读的欲望。关键词通常包括对号入座、升维词、抱大腿。
  - **对号入座**：使用年龄、性别、职业等关键词吸引特定群体。
    - 示例：《30岁中年人如何应对职场危机？》
    - 模板：[年龄/性别/职业]如何应对[具体问题]？
  - **升维词**：用更有吸引力的词替代普通词汇。
    - 示例：原标题《政府出台新政策》升维为《政府重磅推出改变未来的新政策》
    - 模板：原标题《[普通词汇]》升维为《[吸引力更强的词汇]》
  - **抱大腿**：在标题中加入名人、热点话题、KOL等，提高点击率。
    - 示例：《董宇辉亲测推荐的减肥方法，真的有效吗？》
    - 模板：《[名人]推荐的[方法/产品]，真的[效果]吗？》
  2. **冲突反差式**
  利用常识之外的矛盾与反差激发读者的好奇心。可从数字对比和认知矛盾两方面入手。
  - **数字对比**：通过前后数字对比形成强烈反差。
    - 示例：《疫情前后，房价竟然跌了30%？》
    - 模板：《[时间/事件前后]，[事物]竟然[变化百分比%]？》
  - **认知矛盾**：颠覆读者固有认知。
    - 示例：《为什么高学历者更容易感到焦虑？》
    - 模板：《为什么[常识认知]反而[出人意料的结果]？》
  3. **提问式**
  提问式标题通过直击读者的痛点，吸引他们点击解决问题。
  - **纯痛点疑问**：用问题吸引读者注意。
    - 示例：《年轻人为什么越来越难买房？》
    - 模板：《[群体]为什么[痛点问题]？》
  - **自问自答**：在标题中直接给出解决方案。
    - 示例：《如何在疫情期间保持心理健康？这里有5个方法》
    - 模板：《如何[解决问题]？这里有[数字]个方法》
  4. **悬念式**
  悬念式标题通过留白激发读者好奇心，给读者遐想空间。
  - **省略号留白**：在最精彩的地方戛然而止。
    - 示例：《他在街头的举动让所有人震惊……》
    - 模板：《[引人入胜的情节]……》
  - **具体场景**：描述具体场景，引发窥探欲。
    - 示例：《深夜地铁里的奇怪现象，你见过吗？》
    - 模板：《[具体场景]，你见过吗？》
  5. **场景式**
  在标题中描述与读者息息相关的具体细节，让他们感同身受，从而吸引阅读。
  - 示例：《独居老人如何应对突发紧急情况？》
  - 模板：《[群体]如何应对[具体问题]？》
  6. **情绪式**
  煽动情绪，引发强烈认同或反感，要了解读者的情感状态，才能用好。
  - 示例：《你是否也曾在关键时刻被冷落？》
  - 模板：《[情绪相关的问题或陈述]》
  7. **强调式**
  通过“最好”、“注意”、“必须”等词，利用损失厌恶心理吸引读者。
  - 示例：《必须了解的最新环保政策，别再忽视了！》
  - 模板：《[强调词]了解的[主题]，别再[负面行为]了！》

  ### 决定标题打开率的 3 个细节
  1. **多数字**：用数字增加标题的辨识度和可信度。
      - 示例：原标题《调查显示年轻人购车意愿高》改为《调查显示，超过60%的年轻人计划在2024年购车》
      - 模板：《调查显示，超过[数字%]的[群体]计划[行动]》
  2. **符号**：灵活使用“！”、“？”、“……”、“「」”等符号增加标题的视觉冲击力。
      - 示例：《突发！政府宣布重大经济调整措施》
      - 模板：《[强调词]！[事件/声明]》
  3. **简单易懂**：不要玩文字游戏，好标题一定是简单易懂的。把读者当作“初中生”，尽量减少阅读障碍。
      - 示例：《如何在三个月内提升社交技能》
      - 模板：《如何在[时间]内[达成目标]》

content_prompt: |
  - **基调**：悬疑和惊喜，吸引读者的好奇心。
  - **语言风格**：简洁而富有张力，营造悬念和紧迫感。
  - **文章结构**：
    - **开篇**：描绘一个看似普通的场景，设置悬念，引发读者的好奇。
    - **中间部分**：逐步透露关键细节，保持紧张的节奏，增加反转的暗示。
    - **结尾**：出人意料的反转揭示真相，令读者震惊并反思。
  - **独特性增强**：通过独特的情节设计和反转，让文章更具吸引力，避免套路化。
  - **情绪价值**：给读者带来意外的惊喜和思考，激发他们的探索欲。

format_prompt: |
  - **一段一句**：采用一句话一段的形式，增强节奏感和阅读流畅性。
  - **一句尽量简短**：一句话不超过50个字。
  - **适当的图片数量**:每个章节有2~4张图片即可。