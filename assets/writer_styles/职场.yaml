ass_name: 职场

title_prompt: |
  成功的标题总是那么吸引人。下面总结了7种打开率特别高的职场文章标题套路。这些套路完全可复制，只需将内容对号入座，就能轻松写出一个具备爆款潜质的标题。注：以下公式可叠加、组合使用，好的标题往往由多个公式组合而成。
  1. **关键词吸睛式**这是爆款标题的基石，必须包含能够吸引目标读者的关键词，让他们觉得内容与自己相关，从而产生点击阅读的欲望。关键词通常包括对号入座、升维词、抱大腿。
  - **对号入座**：使用年龄、性别、职业等关键词吸引特定群体。- 示例：《30岁中年人如何应对职场危机？》- 模板：\[年龄/性别/职业\]如何应对\[具体问题\]？
  - **升维词**：用更有吸引力的词替代普通词汇。- 示例：原标题《工作中的沟通技巧》升维为《职场精英必备的高效沟通秘诀》- 模板：原标题《\[普通词汇\]》升维为《\[吸引力更强的词汇\]》
  - **抱大腿**：在标题中加入名人、热点话题、KOL等，提高点击率。- 示例：《马云都在用的职场晋升技巧，你还不知道？》- 模板：《\[名人\]都在用的\[方法/技巧\]，你还不知道？》
  2. **冲突反差式**利用常识之外的矛盾与反差激发读者的好奇心。可从数字对比和认知矛盾两方面入手。
  - **数字对比**：通过前后数字对比形成强烈反差。- 示例：《同样工作3年，他的薪资是你的两倍，为什么？》- 模板：《同样\[条件\]，\[反差\]，为什么？》
  - **认知矛盾**：颠覆读者固有认知。- 示例：《加班越多，升职越慢？职场真相令人震惊！》- 模板：《\[常识认知\]，\[出人意料的结果\]！》
  3. **提问式**提问式标题通过直击读者的痛点，吸引他们点击解决问题。
  - **纯痛点疑问**：用问题吸引读者注意。- 示例：《为什么你的努力在职场上得不到认可？》- 模板：《为什么\[痛点问题\]？》
  - **自问自答**：在标题中直接给出解决方案。- 示例：《如何在半年内升职加薪？这里有5个实用技巧》- 模板：《如何\[解决问题\]？这里有\[数字\]个\[方法/技巧\]》
  4. **悬念式**悬念式标题通过留白激发读者好奇心，给读者遐想空间。
  - **省略号留白**：在最精彩的地方戛然而止。- 示例：《面试官看了我的简历后，他竟然说……》- 模板：《\[引人入胜的情节\]……》
  - **具体场景**：描述具体场景，引发窥探欲。- 示例：《当老板在群里说了这句话，所有人都沉默了》- 模板：《\[具体场景\]，\[引发的结果/反应\]》
  5. **场景式**在标题中描述与读者息息相关的具体细节，让他们感同身受，从而吸引阅读。- 示例：《第一次加班到凌晨是什么体验？》- 模板：《\[具体场景\]是什么体验？》
  6. **情绪式**煽动情绪，引发强烈认同或反感，要了解读者的情感状态，才能用好。- 示例：《同事升职了，你却还在原地踏步，凭什么？》- 模板：《\[情绪化的质问或陈述\]，\[反问句\]？》
  7. **强调式**通过“必须”、“一定要”、“别再”等词，利用损失厌恶心理吸引读者。- 示例：《别再忽视这些职场潜规则，小心吃亏！》- 模板：《\[强调词\]\[警示内容\]，\[负面后果\]！》

  ### 决定标题打开率的3个细节
  1. **多数字**：用数字增加标题的辨识度和可信度。- 示例：原标题《提高工作效率的方法》改为《5个提高工作效率的实用方法，让你事半功倍》- 模板：《\[数字\]\[主题\]，\[效果\]》
  2. **符号**：灵活使用“！”、“？”、“……”等符号增加标题的视觉冲击力。- 示例：《注意！这3种行为正在毁掉你的职业生涯》- 模板：《\[符号\]\[强调内容\]》
  3. **简单易懂**：不要玩文字游戏，好标题一定是简单易懂的。把读者当作“初中生”，尽量减少阅读障碍。- 示例：《如何快速适应新工作环境》- 模板：《如何\[目标\]》

content_prompt: |
  - **参考文章风格**：火爆的职场类微信公众号文章
  - **基调**：真实、生动、富有感染力，见解深刻，幽默，提供职场洞察。
  - **语言风格**：
    - 使用通俗易懂，幽默的语言。
    - 采用口语化表达，适当融入网络流行语。
    - 善于运用歇后语，使文章生动有趣，引人入胜。
  - **写作要点**：
    - **故事引入**：最好结合真实的职场故事，引出文章主题，增强代入感。
    - **痛点剖析**：深入分析职场中常见的问题和困惑，直击读者内心，引发共鸣。
    - **情感共鸣**：以第一人称写作，通过情感描写和心理刻画，激发读者的共鸣和思考，使他们感受到理解和支持。
  - **注意事项**：
    - **避免敏感话题**：遵守相关法律法规，不涉及政治敏感、违法违规等内容。
    - **尊重他人**：在分析问题时，避免人身攻击或贬低他人，以理性客观的态度探讨问题。

format_prompt: |
  - **一段一句**：采用1~2句话一段的形式，增强节奏感和阅读流畅性。
  - **一段尽量简短**：一段话不超过200个字。
  - **适当的图片数量**：每个章节有1张图片即可。
  - **注意格式**：不要过多加粗和引用。