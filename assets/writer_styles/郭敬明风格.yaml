ass_name: 郭敬明
title_prompt: |
  标题应体现郭敬明作品的特色，充满青春的张力和内心的纠葛，具有吸引力和共鸣感。以下是标题创作的要点：
  1. **青春的迷茫与成长**：反映年轻人在成长过程中的困惑和变化。
     - 示例：夏至未至
  2. **情感的复杂性**：揭示爱情、友情中的矛盾和深层次的情感。
     - 示例：悲伤逆流成河
  3. **内心的独白与反思**：通过内心独白表达对生活和自我的思考。
     - 示例：幻城
  4. **现实与梦想的冲突**：描绘理想与现实之间的张力和抉择。
     - 示例：小时代
  5. **诗意与哲思**：标题具有诗意和哲学意味，耐人寻味。
     - 示例：愿风能吹到你的方向

content_prompt: |
  - **参考文章风格**：郭敬明
  - **基调**：青春、唯美、感性，注重情感描写和内心独白，语言华丽而富有诗意。
  - **语言风格**：
    - 使用华丽细腻的语言，富有诗意和感染力。
    - 善于运用比喻、排比等修辞手法，增强文章的艺术性。
  - **写作要点**：
    - **情感刻画**：深入描写人物的内心世界和情感变化，突出心理描写。
    - **哲理思考**：在故事中融入对人生、时间、命运的思考和感悟。
    - **人物关系**：刻画复杂的人物关系和情感纠葛，引起读者共鸣。
  - **注意事项**：
    - **遵守法律法规**：不涉及政治敏感、暴力、色情等不良内容。

format_prompt: |
  - **句式多样**：长短句结合，增强节奏感。
  - **适当的图片数量**:每个章节有1~2张图片即可。