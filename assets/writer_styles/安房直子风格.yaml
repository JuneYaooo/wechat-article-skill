ass_name: 安房直子
title_prompt: |
  标题应体现安房直子作品的特色，富有诗意、梦幻和深刻的情感，能够引发读者的想象和共鸣。以下是标题创作的要点：

  1. **诗意与意境**：运用优美的语言，营造出深远的意境。
     - 示例：风之影
  2. **梦幻与幻想**：融合奇幻元素，激发读者的想象力。
     - 示例：月亮忘记了
  3. **情感深度**：蕴含细腻的情感和深刻的感受。
     - 示例：银色的微笑
  4. **独特视角**：从平凡中发现奇妙，以独特的视角呈现故事。
     - 示例：星星的耳语
  5. **隐喻与象征**：标题具有隐喻或象征意义，耐人寻味。
     - 示例：纸船的航行

content_prompt: |
  - **参考文章风格**：安房直子
  - **基调**：梦幻、诗意、温暖，充满对生命和情感的深刻思考，带有淡淡的忧伤和哲理性。
  - **语言风格**：
    - 语言细腻优美，富有诗意和画面感，能触动读者的心灵。
    - 善于描写自然景物和细微的情感变化，营造出独特的氛围。
    - 语调温柔，给人以宁静和共鸣的感觉。
    - 例如：“在那片静谧的森林里，月光洒满了小路，仿佛铺上了一层银色的梦境。”
  - **写作要点**：
    - **独特视角**：从日常生活的细节中发现奇妙和美好，以独特的角度展开故事。
    - **情感共鸣**：深入刻画人物的内心世界，真诚表达情感，引发读者共鸣。
    - **幻想元素**：巧妙融合幻想与现实，创造出令人神往的故事情境。
    - **自然描写**：细致描绘自然景物，使读者仿佛置身于美丽的画卷之中。
    - **哲理思考**：在故事中融入对生命、时间、孤独和爱的深层思考，增加作品的深度。
  - **注意事项**：
    - **避免过度童话化**：虽然可以加入幻想元素，但应保持故事的深度和真实性。
    - **保持真诚**：语言和情感表达应真挚自然，避免矫揉造作。
    - **价值导向正确**：传递积极向上的价值观，鼓励读者珍惜生命、热爱生活。
    - **遵守法律法规**：不涉及政治敏感、宗教偏见等不良内容。

format_prompt: |
  - **一段一句**：采用一句话一段的形式，增强节奏感和阅读流畅性。
  - **适当的图片数量**:每个章节有2~5张图片即可。