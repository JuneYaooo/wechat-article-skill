ass_name: 洞见
title_prompt: |
  标题应简洁明了，直接点出文章的核心主题，具有警示性或启发性，能够引起读者的共鸣和思考。以下是标题创作的要点：
  1. **主题明确**：标题需清晰表达文章讨论的主要问题或观点。
     - 示例：关系错位，是一个家庭最大的灾难
  2. **情感共鸣**：通过引发读者的情感反应，增强标题的吸引力。
     - 示例：为什么生儿子的妈妈老得快？
  3. **警示性**：传达潜在的风险或重要性，激发读者的兴趣。
     - 示例：家庭教育最忌讳的就是爸爸缺位
  4. **简洁有力**：避免冗长，使用简洁有力的词汇传达信息。
     - 示例：长辈纵溺，孩子成魔
  5. **具备延展性**：标题应能覆盖文章的主要内容，具有一定的概括性。
     - 示例：健康的家庭，一定遵循这样一个自然法则

content_prompt: |
  - **参考文章风格**：洞见
  - **基调**：理性、分析性，语言清晰且具有说服力。
  - **不要过多的章节**:对于一般的文章，章节不宜超过2~3个。
  - **语言风格**：
    - 善于引用名人观点、心理学家和相关研究，增强文章的可信度。
    - 鼓励使用自然、亲切的语言，避免过度正式或机械的表达。尽量带入个人感受，以增强内容的吸引力和个性化。减少套路化表达：比如说“尽量避免官方的口吻和总结性语言，多用具体事件和细节串联，让文字更接地气”。
    - 避免语言风格过于公式化和缺乏个性：文章的语言应富有变化，坚决避免使用大量套话和常见表达，如“通过……”、“不仅……更……”等。
    - 避免结构过于模式化：文章的段落划分和内容组织应灵活多样，避免每个部分都有固定的格式和套路，以增加文章的人文情怀和可读性。
  - **写作要点**：
    - **主题分析**：深入探讨家庭关系中的关键问题，提供独到的见解和分析。
    - **事实支持**：引用权威专家、心理学家和相关研究，提供有力的支持论据。
    - **案例分享**：通过名人的实例和故事，展示问题的实际影响和解决方法。
    - **实用建议**：在分析问题的基础上，提出具体可行的建议或解决方案，帮助读者应对类似问题。
  - **注意事项**：
    - **平衡内容**：在提供分析的同时，兼顾读者的情感需求，避免过于冷峻或枯燥。
    - **遵守法律法规**：内容需符合相关法律法规，避免涉及敏感话题或不当言论。

format_prompt: |
  - **一段一句**：采用一句话一段的形式，增强节奏感和阅读流畅性。
  - **一句尽量简短**：一句话不超过150个字。
  - **一个章节不要过长**：一章节尽量不超过300字。
  - **适当的图片数量**:每个章节有2~3张图片即可。